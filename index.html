<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyTrackr</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1 class="logo">SkyTrackr</h1>
      <p class="tagline">Real-time rocket launches from around the world</p>
    </div>
  </header>

  <main class="container">
    <section class="section-heading">
      <h2>Upcoming Launches</h2>
      <p>
        Explore live launch data including mission names, launch providers,
        locations, dates, and rocket details.
      </p>
    </section>

    <section class="controls-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by launch name..."
        class="control-input"
      />

      <select id="statusFilter" class="control-input">
        <option value="all">All Statuses</option>
        <option value="Go for Launch">Go for Launch</option>
        <option value="Launch Successful">Launch Successful</option>
        <option value="Launch Failure">Launch Failure</option>
        <option value="To Be Confirmed">To Be Confirmed</option>
        <option value="To Be Determined">To Be Determined</option>
      </select>

      <select id="sortSelect" class="control-input">
        <option value="date-asc">Sort by Date (Earliest)</option>
        <option value="date-desc">Sort by Date (Latest)</option>
        <option value="name-asc">Sort by Name (A-Z)</option>
        <option value="name-desc">Sort by Name (Z-A)</option>
      </select>
    </section>

    <section id="status-section" class="status-section">
      <div id="loading" class="status-card loading">Loading launches...</div>
      <div id="error" class="status-card hidden"></div>
    </section>

    <section id="launches-grid" class="launches-grid hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
